<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UPCO | Simulador 360</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
   
    <style>
        :root {
            --lupco-dark: #0B3D2E;
            --white: #FFFFFF;
        }

        body, html { width: 100%; height: 100%; margin: 0; overflow: hidden; background-color: #000; }

        /* PORTADA OPTIMIZADA */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
            background: linear-gradient(to bottom, rgba(11, 61, 46, 0.8), rgba(11, 61, 46, 0.95)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover;
            transition: opacity 0.5s ease;
        }

        .logo-container { width: 180px; margin-bottom: 20px; }
        .logo-container img { width: 100%; height: auto; }

        h1 { color: var(--white); font-family: sans-serif; font-size: 1.5rem; padding: 0 20px; text-transform: uppercase; }
       
        #btn-start {
            margin-top: 30px; padding: 15px 35px;
            background: var(--lupco-dark); color: white;
            border: 2px solid white; border-radius: 50px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_upco.png" alt="UPCO">
        </div>
        <h1>Actos Inseguros en Operaciones</h1>
        <button id="btn-start" onclick="iniciar()">Iniciar Exploración</button>
    </div>

    <a-scene vr-mode-ui="enabled: true">
        <a-assets>
            <img id="sky-img" src="360_vr_4096.jpg">
        </a-assets>

        <a-sky src="#sky-img" rotation="0 -90 0"></a-sky>

        <a-entity id="rig">
            <a-camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true" 
                      wasd-controls-enabled="false">
            </a-camera>
        </a-entity>
    </a-scene>

    <script>
        function iniciar() {
            // Solicitar permisos de giroscopio para evitar que la cámara se quede quieta
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response == 'granted') { finalizarCarga(); }
                }).catch(console.error);
            } else {
                finalizarCarga();
            }
        }

        function finalizarCarga() {
            document.getElementById('overlay').classList.add('hidden');
            // NO usamos scene.enterVR() para que empiece en una sola pantalla (no doble)
        }
    </script>
</body>
</html>
