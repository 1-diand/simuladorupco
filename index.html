<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UPCO VR | Simulador</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
   
    <style>
        :root { --lupco-dark: #0B3D2E; --white: #FFFFFF; }
        body, html { width: 100%; height: 100%; margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
            background: linear-gradient(to bottom, rgba(11, 61, 46, 0.85), rgba(11, 61, 46, 1)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover; color: white;
        }

        .logo-container { width: 150px; margin-bottom: 20px; }
        .logo-container img { width: 100%; height: auto; }

        .btn {
            padding: 18px 30px; color: white; border: 2px solid white;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 0.9rem; margin: 10px;
            min-width: 260px; background: var(--lupco-dark);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_upco.png" alt="UPCO">
        </div>
        <h1>Actos Inseguros en Operaciones</h1>
        
        <button class="btn" onclick="iniciarApp('visor')">🥽 Usar con Visor VR</button>
        <button class="btn" onclick="iniciarApp('navegador')">📱 Ver en Navegador</button>
       
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.8;">IV FORO DE EXCELENCIA OPERACIONAL</p>
    </div>

    <a-scene vr-mode-ui="enabled: true" renderer="antialias: true; precision: medium;">
        <a-assets timeout="10000">
            <img id="sky-img" src="360_vr_4096.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky id="main-sky" src="#sky-img" rotation="0 -90 0" visible="false"></a-sky>

        <a-entity id="rig">
            <a-camera fov="80" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-camera>
        </a-entity>
    </a-scene>

    <script>
        function iniciarApp(modo) {
            const docElm = document.documentElement;
            const scene = document.querySelector('a-scene');
            const overlay = document.getElementById('overlay');
            const sky = document.getElementById('main-sky');

            // 1. SOLUCIÓN FULLSCREEN: Debe ejecutarse ANTES de cualquier otra lógica
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(err => console.log("Error Fullscreen:", err));
            } else if (docElm.webkitRequestFullscreen) { /* Safari/iOS */
                docElm.webkitRequestFullscreen();
            }

            // 2. SOLUCIÓN PANTALLA NEGRA: Forzar actualización de textura
            sky.setAttribute('visible', 'true');
            overlay.classList.add('hidden');

            // Pequeño retraso para que la GPU procese el cambio
            setTimeout(() => {
                if (modo === 'visor') {
                    scene.enterVR();
                }
                
                // Refrescar el material para asegurar que no se vea negro
                const mesh = sky.getObject3D('mesh');
                if (mesh && mesh.material && mesh.material.map) {
                    mesh.material.map.needsUpdate = true;
                }
            }, 300);

            // 3. PERMISOS DE SENSORES
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }
        }

        // Si se sale de VR, volver a mostrar el menú
        document.querySelector('a-scene').addEventListener('exit-vr', () => {
            document.getElementById('overlay').classList.remove('hidden');
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        });
    </script>
</body>
</html>
