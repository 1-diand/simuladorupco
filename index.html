<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UPCO VR | Calibración Tzumi</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
   
    <style>
        :root { --lupco-dark: #0B3D2E; --white: #FFFFFF; }
        body, html { width: 100%; height: 100%; margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
            background: linear-gradient(to bottom, rgba(11, 61, 46, 0.8), rgba(11, 61, 46, 0.95)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover; color: white;
        }

        .logo-container { width: 150px; margin-bottom: 20px; }
        .logo-container img { width: 100%; height: auto; }

        .btn {
            padding: 18px 30px; color: white; border: 2px solid white;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 0.9rem; margin: 10px;
            min-width: 260px; background: var(--lupco-dark);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_upco.png" alt="UPCO">
        </div>
        <h1>Actos Inseguros en Operaciones</h1>
        
        <button class="btn" onclick="forzarModoVR()">🥽 ACTIVAR MODO VISOR</button>
       
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.8;">IV FORO DE EXCELENCIA OPERACIONAL</p>
    </div>

    <a-scene 
        webxr="referenceSpaceType: local; requiredFeatures: local-floor;"
        vr-mode-ui="enabled: true; enterVRButton: #btn-oculto">
        
        <a-assets>
            <img id="sky-img" src="360_vr_4096.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky id="main-sky" src="#sky-img" rotation="0 -90 0" visible="false"></a-sky>

        <a-entity id="rig">
            <a-camera fov="80" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-camera>
        </a-entity>

        <div id="btn-oculto" style="display:none"></div>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const sky = document.getElementById('main-sky');
        const overlay = document.getElementById('overlay');

        function forzarModoVR() {
            // 1. Pantalla completa primero (Obligatorio)
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

            // 2. Permisos de Sensores
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if(res === 'granted') activarDoblePantalla();
                }).catch(() => activarDoblePantalla());
            } else {
                activarDoblePantalla();
            }
        }

        function activarDoblePantalla() {
            sky.setAttribute('visible', 'true');
            overlay.classList.add('hidden');

            // 3. Forzado de VR Estereoscópico
            // Si el navegador bloquea enterVR(), intentamos lanzarlo con un delay mínimo
            setTimeout(() => {
                if (scene.enterVR) {
                    scene.enterVR();
                } else {
                    // Si falla, notificamos (esto suele pasar por falta de HTTPS)
                    alert("Tu navegador bloqueó el modo VR. Asegúrate de usar una conexión segura (HTTPS).");
                }
            }, 200);
        }

        // Si entras a VR pero sigue sin dividir, intenta pulsar el icono de gafas que saldrá abajo
        scene.addEventListener('enter-vr', () => {
            console.log("Entró en modo VR");
        });
    </script>
</body>
</html>
