<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UPCO | Determina Actos Inseguros</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
   
    <style>
        :root {
            --lupco-dark: #0B3D2E;      /* Verde Corporativo UPCO */
            --lupco-accent: #1A5C45;
            --white: #FFFFFF;
        }

        /* RESET GENERAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
       
        /* PORTADA DE BIENVENIDA (OVERLAY) */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            /* Graduación de color sobre la imagen de portada */
            background: linear-gradient(to bottom, rgba(11, 61, 46, 0.75), rgba(11, 61, 46, 0.95)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover; /* Ajusta la imagen al tamaño de la pantalla */
            transition: opacity 0.6s ease;
        }
       
        /* CONTENEDOR DEL LOGO */
        .logo-container {
            margin-bottom: 2rem;
            width: 60%;
            max-width: 200px; /* Evita que el logo se vea gigante */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* TEXTOS */
        #overlay h1 {
            color: var(--white);
            font-size: clamp(1.2rem, 5vw, 2rem); /* Tamaño fluido según pantalla */
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-weight: 700;
            line-height: 1.2;
            max-width: 85%;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #overlay p {
            color: rgba(255,255,255,0.9);
            font-size: 1rem;
            margin-bottom: 2rem;
        }
       
        /* BOTÓN DE ACCIÓN */
        #btn-vr {
            padding: 16px 36px;
            background: var(--lupco-dark);
            color: var(--white);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #btn-vr:hover {
            background: var(--lupco-accent);
            transform: scale(1.05);
            border-color: var(--white);
        }
       
        /* ELEMENTOS OCULTOS */
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
       
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
        }

        /* ESCENA A-FRAME */
        a-scene {
            display: block;
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_upco.png" alt="UPCO Logo" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
            <h2 id="logo-fallback" style="display:none; color:white; font-size:2rem;">UPCO</h2>
        </div>
       
        <h1>DETERMINA LOS ACTOS INSEGUROS EN LAS OPERACIONES PETROLERAS</h1>
        <p>IV Foro de Excelencia Operacional</p>
       
        <button id="btn-vr" onclick="solicitarPermisosYEntrar()">🥽 INICIAR EXPERIENCIA VR</button>
       
        <div class="footer">
            21 de mayo • UPCO ©2026
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: true" renderer="antialias: true; colorManagement: true;">
        
        <a-assets>
            <img id="sky-360" src="360_vr_4096.jpg">
        </a-assets>
       
        <a-sky id="vr-sky" src="#sky-360" rotation="0 -90 0" visible="false"></a-sky>

        <a-entity id="rig">
            <a-camera id="main-camera" 
                      look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true"
                      wasd-controls-enabled="false"
                      position="0 1.6 0">
            </a-camera>
        </a-entity>

    </a-scene>

    <script>
        /**
         * Solicita permisos de sensores para móviles y activa la vista VR
         */
        async function solicitarPermisosYEntrar() {
            const scene = document.querySelector('a-scene');
            const sky = document.getElementById('vr-sky');
            const overlay = document.getElementById('overlay');

            // Lógica obligatoria para iOS 13+ y navegadores con políticas de privacidad estrictas
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        activarEscena(scene, sky, overlay);
                    } else {
                        alert("Es necesario el permiso de movimiento para explorar la escena 360.");
                    }
                } catch (e) {
                    console.error("Error al solicitar permisos de sensores:", e);
                    activarEscena(scene, sky, overlay); // Intento de respaldo
                }
            } else {
                // Para Android y navegadores de escritorio
                activarEscena(scene, sky, overlay);
            }
        }

        function activarEscena(scene, sky, overlay) {
            if (sky) sky.setAttribute('visible', 'true');
            if (overlay) overlay.classList.add('hidden');
            
            // Forzar entrada a modo VR
            if (scene.enterVR) {
                scene.enterVR();
            }
            
            // Optimización de resolución para mejorar rendimiento en dispositivos móviles
            if (AFRAME.utils.device.isMobile()) {
                scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
            }
        }

        // Si el usuario sale del modo VR, restaurar la interfaz de inicio
        document.querySelector('a-scene').addEventListener('exit-vr', () => {
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('vr-sky').setAttribute('visible', 'false');
        });
    </script>
</body>
</html>
