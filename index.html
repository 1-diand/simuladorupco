<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UPCO VR | Simulador</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
   
    <style>
        :root { --lupco-dark: #0B3D2E; --white: #FFFFFF; }
        body, html { width: 100%; height: 100%; margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }

        /* PORTADA CON IMAGEN DE FONDO */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
            background: linear-gradient(to bottom, rgba(11, 61, 46, 0.8), rgba(11, 61, 46, 0.95)), 
                        url('portada.jpg') no-repeat center center;
            background-size: cover; color: white;
        }

        .logo-container { width: 150px; margin-bottom: 20px; }
        .logo-container img { width: 100%; height: auto; }

        .btn {
            padding: 18px 30px; color: white; border: 2px solid white;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 0.9rem; margin: 10px;
            min-width: 260px; background: var(--lupco-dark);
            -webkit-appearance: none; /* Mejora compatibilidad en iOS */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_upco.png" alt="UPCO">
        </div>
        <h1>Actos Inseguros en Operaciones</h1>
        
        <button class="btn" onclick="lanzarVR()">🥽 Usar con Visor VR</button>
        <button class="btn" onclick="lanzarNavegador()">📱 Ver en Navegador</button>
       
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.8;">IV FORO DE EXCELENCIA OPERACIONAL</p>
    </div>

    <a-scene vr-mode-ui="enabled: true" renderer="antialias: true; precision: medium;">
        <a-assets>
            <img id="sky-img" src="360_vr_4096.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky id="main-sky" src="#sky-img" rotation="0 -90 0" visible="false"></a-sky>

        <a-entity id="rig">
            <a-camera id="cam" fov="80" look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-camera>
        </a-entity>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const sky = document.getElementById('main-sky');
        const overlay = document.getElementById('overlay');

        // FUNCIÓN 1: MODO VISOR (Doble imagen)
        function lanzarVR() {
            activarSensores();
            // Fullscreen primero
            forzarFullscreen();
            // Entrar a VR directamente
            sky.setAttribute('visible', 'true');
            overlay.classList.add('hidden');
            setTimeout(() => { scene.enterVR(); }, 200);
        }

        // FUNCIÓN 2: MODO NAVEGADOR (Imagen única)
        function lanzarNavegador() {
            activarSensores();
            // Fullscreen primero
            forzarFullscreen();
            // Mostrar escena sin activar modo VR
            sky.setAttribute('visible', 'true');
            overlay.classList.add('hidden');
        }

        // Bloque de Fullscreen universal
        function forzarFullscreen() {
            const el = document.documentElement;
            const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if (rfs) rfs.call(el);
        }

        // Permisos de sensores (Giroscopio)
        function activarSensores() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }
        }

        // Escuchar cuando el usuario sale de VR para volver a la portada
        scene.addEventListener('exit-vr', () => {
            overlay.classList.remove('hidden');
            sky.setAttribute('visible', 'false');
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        });
    </script>
</body>
</html>
